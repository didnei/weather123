<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌤️ 위치 기반 날씨 앱</title>
<style>
/* (기존 스타일 유지) */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { font-family: -apple-system, sans-serif; color: #333; }
.container { min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
.main { max-width: 600px; margin: 0 auto; }
h1 { color: white; text-align: center; margin-bottom: 40px; font-size: 2.5rem; }
.card, .weatherCard { background: white; border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
.weatherContent { background: #f5f5f5; border-radius: 8px; padding: 15px; max-height: 400px; overflow-y: auto; font-family: monospace; line-height: 1.6; }
.error { background: #fee; border-left: 4px solid #d32f2f; padding: 20px; margin-bottom: 20px; color: #c62828; }
.loading { background: white; border-radius: 16px; padding: 40px; text-align: center; color: #667eea; animation: pulse 1.5s infinite; }
.btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; width: 100%; transition: 0.3s; }
.btn:hover { background: #764ba2; }
.debug { background: rgba(255, 255, 255, 0.9); padding: 15px; margin-top: 20px; font-size: 0.9rem; border-radius: 8px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
</style>
</head>
<body>
<div class="container">
  <main class="main">
    <h1>🌤️ 위치 기반 날씨 앱</h1>
    <div id="app"></div>
  </main>
</div>

<script>
const appDiv = document.getElementById('app');
let loading = false;
let error = null;
let userLocation = null; // location -> userLocation 으로 변경
let weather = null;
let coords = null;

// LCC 좌표 변환 (기상청 격자 좌표 변환)
function convertLatLonToGrid(lat, lon) {
  const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136;
  const DEGRAD = Math.PI / 180.0;
  const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
  let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
  sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
  let sf = Math.tan(Math.PI * 0.25 + slat1 * 0.5);
  sf = (Math.pow(sf, sn) * Math.cos(slat1)) / sn;
  let ro = Math.tan(Math.PI * 0.25 + olat * 0.5);
  ro = (re * sf) / Math.pow(ro, sn);
  let ra = Math.tan(Math.PI * 0.25 + lat * DEGRAD * 0.5);
  ra = (re * sf) / Math.pow(ra, sn);
  let theta = lon * DEGRAD - olon;
  if (theta > Math.PI) theta -= 2.0 * Math.PI;
  if (theta < -Math.PI) theta += 2.0 * Math.PI;
  theta *= sn;
  return {
    nx: Math.floor(ra * Math.sin(theta) + XO + 0.5),
    ny: Math.floor(ro - ra * Math.cos(theta) + YO + 0.5)
  };
}

// 기상청 단기예보 발표 시간 계산 (02, 05, 08, 11, 14, 17, 20, 23시)
function getBaseDateTime() {
  const now = new Date();
  let baseDate = now.toISOString().slice(0, 10).replace(/-/g, "");
  const hours = [2, 5, 8, 11, 14, 17, 20, 23];
  const currentHour = now.getHours();
  
  // 현재 시간보다 이전의 가장 가까운 발표 시간 찾기
  let targetHour = hours.filter(h => h <= currentHour).pop();
  
  if (targetHour === undefined) { // 02시 이전인 경우 어제 23시 데이터 사용
    const yesterday = new Date(now.setDate(now.getDate() - 1));
    baseDate = yesterday.toISOString().slice(0, 10).replace(/-/g, "");
    targetHour = 23;
  }
  
  const baseTime = String(targetHour).padStart(2, '0') + '00';
  return { baseDate, baseTime };
}

async function fetchWeather(nx, ny) {
  try {
    const { baseDate, baseTime } = getBaseDateTime();
    const response = await fetch(`/api/weather?nx=${nx}&ny=${ny}&baseDate=${baseDate}&baseTime=${baseTime}`);
    const data = await response.json();
    
    if (!response.ok) throw new Error(data.error || '날씨 데이터를 가져올 수 없습니다');
    
    weather = data;
    error = null;
  } catch (err) {
    error = `날씨 데이터 오류: ${err.message}`;
  } finally {
    loading = false;
    render();
  }
}

function getLocation() {
  loading = true;
  error = null;
  render();

  if (!navigator.geolocation) {
    error = '브라우저가 위치 정보를 지원하지 않습니다.';
    loading = false;
    render();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      const { latitude, longitude } = position.coords;
      coords = { latitude, longitude };
      const grid = convertLatLonToGrid(latitude, longitude);
      userLocation = { latitude, longitude }; // userLocation 업데이트
      await fetchWeather(grid.nx, grid.ny);
    },
    (err) => {
      error = `위치 정보 오류: ${err.message}`;
      loading = false;
      render();
    }
  );
}

function render() {
  let html = '';
  if (error) html += `<div class="card error"><p>${error}</p><button class="btn" onclick="getLocation()">다시 시도</button></div>`;
  if (loading) html += `<div class="loading"><p>📍 위치 정보를 가져오는 중...</p></div>`;
  
  if (userLocation && !loading) {
    html += `<div class="card"><h2>📍 현재 위치</h2><p>위도: ${userLocation.latitude.toFixed(4)}, 경도: ${userLocation.longitude.toFixed(4)}</p><button class="btn" onclick="getLocation()">위치 갱신</button></div>`;
  }

  if (weather && !loading && weather.response?.body) {
    const items = weather.response.body.items.item || [];
    const categoryMap = { 'TMP': '🌡️ 현재 기온', 'POP': '☔ 강수 확률', 'SKY': '☁️ 하늘 상태', 'WSD': '💨 풍속', 'REH': '💧 습도' };
    
    let weatherHtml = '<h2>🌡️ 예보 정보</h2><div class="weatherContent">';
    items.filter(i => categoryMap[i.category]).slice(0, 5).forEach(item => {
      const cat = categoryMap[item.category];
      weatherHtml += `<div><strong>${cat}:</strong> ${item.fcstValue}${getUnit(item.category)}</div>`;
    });
    weatherHtml += '</div>';
    html += `<div class="weatherCard">${weatherHtml}</div>`;
  }

  appDiv.innerHTML = html;
}

function getUnit(category) {
  const units = { 'TMP': '℃', 'POP': '%', 'WSD': 'm/s', 'REH': '%' };
  return units[category] || '';
}

window.addEventListener('DOMContentLoaded', getLocation);
</script>
</body>
</html>
